name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and start container
        run: docker compose -f docker-compose-test.yml up -d --build

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for Samba to start..."
          for i in $(seq 1 30); do
            if docker exec samba-test smbclient -N -L //127.0.0.1 2>&1 | grep -qi "disk"; then
              echo "Samba is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Samba failed to start"
          docker logs samba-test
          exit 1

      - name: Smoke test - list shares
        run: |
          OUTPUT=$(docker exec samba-test smbclient -N -L //127.0.0.1 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "public" || { echo "Share 'public' not found"; exit 1; }

      - name: Smoke test - write and read file
        run: |
          docker exec samba-test smbclient -U samba%samba //127.0.0.1/public \
            -c 'put /etc/hostname test-file.txt' 2>&1
          OUTPUT=$(docker exec samba-test smbclient -U samba%samba //127.0.0.1/public \
            -c 'ls' 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "test-file.txt" || { echo "File not found"; exit 1; }

      - name: Smoke test - verify file content
        run: |
          docker exec samba-test smbclient -U samba%samba //127.0.0.1/public \
            -c 'get test-file.txt /tmp/downloaded.txt' 2>&1
          docker exec samba-test cat /tmp/downloaded.txt
          echo "File read/write OK"

      - name: Smoke test - veto files
        run: |
          PUT_OUTPUT=$(docker exec samba-test smbclient -U samba%samba //127.0.0.1/public \
            -c 'put /etc/hostname .DS_Store' 2>&1 || true)
          echo "$PUT_OUTPUT"
          echo "$PUT_OUTPUT" | grep -q "NT_STATUS_OBJECT_NAME_NOT_FOUND" \
            || { echo "Expected vetoed file upload to be rejected"; exit 1; }
          OUTPUT=$(docker exec samba-test smbclient -U samba%samba //127.0.0.1/public \
            -c 'ls' 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "\.DS_Store" && { echo "Veto file should not be visible"; exit 1; }
          echo "Veto files OK"

      - name: Smoke test - guest access denied
        run: |
          if docker exec samba-test smbclient -N //127.0.0.1/public -c 'ls' >/tmp/guest-output.txt 2>&1; then
            echo "Guest access should be denied"
            cat /tmp/guest-output.txt
            exit 1
          fi
          cat /tmp/guest-output.txt
          grep -Eqi "NT_STATUS_ACCESS_DENIED|Access denied|tree connect failed" /tmp/guest-output.txt \
            || { echo "Expected guest access denial message"; exit 1; }

      - name: Smoke test - optional services disabled by default
        run: |
          docker exec samba-test /command/s6-svstat /var/run/s6/legacy-services/wsdd 2>&1 | grep -q "^down" \
            && echo "wsdd: down (correct)" || { echo "wsdd should be down by default"; docker logs samba-test; exit 1; }
          docker exec samba-test /command/s6-svstat /var/run/s6/legacy-services/avahi 2>&1 | grep -q "^down" \
            && echo "avahi: down (correct)" || { echo "avahi should be down by default"; docker logs samba-test; exit 1; }

      - name: Smoke test - optional services start with wsdd2 config
        run: |
          docker compose -f docker-compose-test.yml down -v
          docker run -d --name samba-discovery \
            --cap-add CAP_NET_ADMIN \
            --cap-add CAP_NET_RAW \
            -e WORKGROUP=TESTWG \
            -e WSDD2_ENABLE=1 \
            -e WSDD2_HOSTNAME=testhost \
            -e WSDD2_NETBIOS_NAME=TESTHOST \
            -e WSDD2_WORKGROUP=TESTWG \
            -e AVAHI_ENABLE=1 \
            -v samba-discovery-data:/share \
            local/samba:test
          sleep 5
          docker exec samba-discovery /command/s6-svstat /var/run/s6/legacy-services/wsdd 2>&1 | grep -q "^up" \
            && echo "wsdd: up (correct)" || { echo "wsdd not running"; docker logs samba-discovery; exit 1; }
          docker exec samba-discovery /command/s6-svstat /var/run/s6/legacy-services/avahi 2>&1 | grep -q "^up" \
            && echo "avahi: up (correct)" || { echo "avahi not running"; docker logs samba-discovery; exit 1; }
          docker logs samba-discovery 2>&1 | grep -q "Starting wsdd2 -H testhost -N TESTHOST -G TESTWG" \
            || { echo "wsdd2 did not start with expected arguments"; docker logs samba-discovery; exit 1; }
          docker rm -f samba-discovery
          docker volume rm samba-discovery-data

      - name: Smoke test - guest access allowed with GUEST_OK
        run: |
          docker run -d --name samba-guest \
            -e GUEST_OK=1 \
            -v samba-guest-data:/share \
            local/samba:test
          sleep 3
          docker exec samba-guest smbclient -N //127.0.0.1/public -c 'ls' 2>&1 \
            || { echo "Guest access should be allowed"; docker logs samba-guest; exit 1; }
          docker exec samba-guest smbclient -N //127.0.0.1/public \
            -c 'put /etc/hostname guest-test.txt' 2>&1 \
            || { echo "Guest should be able to write"; docker logs samba-guest; exit 1; }
          echo "Guest access OK"
          docker rm -f samba-guest
          docker volume rm samba-guest-data

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose-test.yml down -v

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/samba"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="sha-$(git rev-parse --short HEAD)"

          docker build -t "${IMAGE}:${SHA_TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${SHA_TAG}"
          docker push "${IMAGE}:latest"
